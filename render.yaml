services:
  - type: web
    name: smartsalat-api
    runtime: python
    plan: free
    rootDir: backend        # backend lives in the backend/ subfolder of this monorepo
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false          # set this secret in the Render dashboard
